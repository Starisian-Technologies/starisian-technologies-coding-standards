name: Security issue
description: Report a potential security weakness in standards or workflows.
title: "[Security]: "
labels: ["security", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        For sensitive or exploitable vulnerabilities, use private reporting via SECURITY.md instead of a public issue.
  - type: textarea
    id: summary
    attributes:
      label: Security concern summary
    validations:
      required: true
  - type: textarea
    id: affected
    attributes:
      label: Affected file(s) or workflow(s)
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction or proof
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Estimated severity
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true
