name: Documentation issue
description: Report stale, missing, or incorrect repository documentation.
title: "[Docs]: "
labels: ["documentation", "triage"]
body:
  - type: textarea
    id: location
    attributes:
      label: Affected documentation
      description: Provide file path(s) and section(s).
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is wrong?
    validations:
      required: true
  - type: textarea
    id: fix
    attributes:
      label: Suggested fix
    validations:
      required: true
