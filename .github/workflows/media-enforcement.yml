# ============================================================
# STD-TOOLCHAIN-001 v1.3 — Media / Upload Enforcement
# Workflow ref: see caller for pin; never use @main in production.
# Profile: wp-plugin | standalone-react | standalone-node
# ============================================================
#
# STATICALLY ENFORCED HERE:
#   - MEDIA-RECORDER-001: no direct new MediaRecorder() in product code
#   - MEDIA-CONSTRAINTS-001: getUserMedia constraints enforce sampleRate <= 16000
#   - MEDIA-AUTOSTART-001: no auto-start capture on DOMContentLoaded/load
#   - MEDIA-TUS-001: no full-file upload (no FormData without TUS)
#   - MEDIA-CHUNK-001: TUS chunk size <= 512 KB
#   - MEDIA-FFMPEG-001: no user-supplied FFmpeg arguments (server-side)
#   - MEDIA-WAV-001: no WAV or uncompressed PCM upload/output
#
# VERIFIED VIA PRESENCE VALIDATION (warn-only pending §4 fixtures):
#   - (no file-presence requirements for media enforcement — cross-cutting)
#
# NOT MACHINE-CHECKED (requires conformance test suite — §6):
#   - Runtime codec verification (requires E2E tests in consuming repo)
#   - Actual MediaRecorder API usage through approved SDK
#
# Caller example: see caller-templates/standards-php-wordpress.yml
# ============================================================

name: Media/upload enforcement (STD-TOOLCHAIN-001 v1.3)

on:
  workflow_call:
    inputs:
      repo_type:
        description: 'Repo type: wp-plugin | standalone-react | standalone-node'
        required: false
        type: string
        default: standalone-react
      profile_version:
        description: 'Profile version to validate against (e.g. v1).'
        required: false
        type: string
        default: v1
      enforcement_mode:
        description: 'gate (fail-closed) | advisory (warn-only) | (empty = legacy mode fallback)'
        required: false
        type: string
        default: ''
      mode:
        description: 'DEPRECATED: use enforcement_mode.'
        # REMOVAL: 2027-01-01 — all callers must migrate to enforcement_mode before this date
        required: false
        type: string
        default: draft

jobs:
  enforce:
    name: Media/upload standards conformance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse standards exceptions (.standards/standards-exceptions.yml)
        id: exceptions
        # GitHub's YAML parser breaks on Python heredoc syntax when code is at column 0.
        # Script is stored in an env var; textwrap.dedent strips the YAML-induced indentation.
        env:
          PARSE_SCRIPT: |
            import sys, os, textwrap
            from datetime import date
            try:
                import yaml
            except ImportError:
                print("::error::PyYAML not available after install attempt — cannot parse exceptions file")
                sys.exit(1)
            today = date.today().isoformat()
            active = []
            expired = []
            malformed = []
            try:
                with open(".standards/standards-exceptions.yml") as f:
                    data = yaml.safe_load(f) or {}
            except Exception as e:
                print(f"::error::standards-exceptions.yml malformed — {e}")
                sys.exit(1)
            exceptions = data.get("exceptions", [])
            if not isinstance(exceptions, list):
                print("::error::standards-exceptions.yml malformed — 'exceptions' must be a list")
                sys.exit(1)
            for exc in exceptions:
                if not isinstance(exc, dict):
                    malformed.append("<no-id>")
                    continue
                required_fields = ["id", "rule", "reason", "owner", "expires", "approval"]
                missing = [f for f in required_fields if f not in exc]
                if missing:
                    malformed.append(exc.get("id", "<no-id>"))
                    continue
                expires = exc["expires"]
                if expires is None:
                    malformed.append(exc.get("id", "<no-id>"))
                    continue
                if not isinstance(expires, str):
                    if hasattr(expires, "isoformat"):
                        expires = expires.isoformat()
                    else:
                        malformed.append(exc.get("id", "<no-id>"))
                        continue
                if expires < today:
                    expired.append(exc["id"])
                else:
                    active.append(exc["id"])
                    print(f"::notice::Active exception: {exc['id']} — {exc['rule']} — expires {expires} — {exc['reason']}")
            if expired:
                print(f"::error::Expired exceptions (fail-closed per STD-TOOLCHAIN-001 §8): {', '.join(expired)}")
                sys.exit(1)
            if malformed:
                print(f"::error::Malformed exception entries: {', '.join(malformed)}")
                sys.exit(1)
            with open(os.environ["GITHUB_OUTPUT"], "a") as out:
                out.write(f"active_exceptions={','.join(active)}\n")
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f ".standards/standards-exceptions.yml" ]; then
            echo "active_exceptions=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          pip3 install pyyaml --quiet
          python3 -c "import textwrap, os; exec(textwrap.dedent(os.environ['PARSE_SCRIPT']))"

      - name: Warn on deprecated 'mode' input
        if: inputs.enforcement_mode == ''
        shell: bash
        run: |
          echo "::warning::DEPRECATED: 'mode' input will be removed 2027-01-01 — migrate to 'enforcement_mode: gate | advisory' (STD-TOOLCHAIN-001 §3)"

      - name: Determine block behavior
        id: mode
        shell: bash
        run: |
          # enforcement_mode takes precedence; fall back to legacy mode input when empty
          em="${{ inputs.enforcement_mode }}"
          lm="${{ inputs.mode }}"
          if [ "$em" = "gate" ]; then
            echo "block=true" >> "$GITHUB_OUTPUT"
          elif [ "$em" = "advisory" ]; then
            echo "block=false" >> "$GITHUB_OUTPUT"
          elif [ -z "$em" ]; then
            # REMOVAL: 2027-01-01 — legacy mode bridge; callers must migrate to enforcement_mode
            case "$lm" in
              draft)                    echo "block=false" >> "$GITHUB_OUTPUT" ;;
              development|production)   echo "block=true"  >> "$GITHUB_OUTPUT" ;;
              *)
                echo "::error::Unknown mode '$lm' — migrate to enforcement_mode: gate | advisory (STD-TOOLCHAIN-001 §3)"
                exit 1 ;;
            esac
          else
            echo "::error::Unknown enforcement_mode '$em' — expected gate | advisory (STD-TOOLCHAIN-001 §3)"
            exit 1
          fi

      - name: MEDIA-RECORDER-001 — no direct new MediaRecorder() in product code
        shell: bash
        run: |
          set -euo pipefail
          hits=$(grep -Prn \
            --include='*.ts' --include='*.js' --include='*.tsx' --include='*.jsx' \
            --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=vendor \
            --exclude='*.test.*' --exclude='*.spec.*' \
            'new\s+MediaRecorder\s*\(' \
            . 2>/dev/null || true)
          if [ -n "$hits" ]; then
            msg=$'MEDIA-RECORDER-001: direct new MediaRecorder() found — use approved SDK:\n'"$hits"
            if [ "${{ steps.mode.outputs.block }}" = "true" ]; then
              echo "::error::$msg"; exit 1
            else
              echo "::warning::$msg"
            fi
          fi

      - name: MEDIA-CONSTRAINTS-001 — getUserMedia calls include sampleRate constraint
        shell: bash
        run: |
          set -euo pipefail
          files_without_sr=$(grep -PrlZ \
            --include='*.ts' --include='*.js' --include='*.tsx' --include='*.jsx' \
            --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=vendor \
            --exclude='*.test.*' --exclude='*.spec.*' \
            'getUserMedia\s*\(' \
            . 2>/dev/null \
            | xargs -0 -r grep -LZ 'sampleRate' 2>/dev/null \
            | xargs -0 -r printf '%s\n' \
            || true)
          if [ -n "$files_without_sr" ]; then
            msg=$'MEDIA-CONSTRAINTS-001: getUserMedia() called without sampleRate constraint:\n'"$files_without_sr"
            if [ "${{ steps.mode.outputs.block }}" = "true" ]; then
              echo "::error::$msg"; exit 1
            else
              echo "::warning::$msg"
            fi
          fi

      - name: MEDIA-AUTOSTART-001 — no auto-start capture on load events
        shell: bash
        run: |
          set -euo pipefail
          hits=$(grep -Prn \
            --include='*.ts' --include='*.js' --include='*.tsx' --include='*.jsx' \
            --exclude-dir=node_modules --exclude-dir=dist \
            --exclude='*.test.*' --exclude='*.spec.*' \
            "addEventListener\s*\(\s*['\"]DOMContentLoaded['\"].*getUserMedia|addEventListener\s*\(\s*['\"]load['\"].*getUserMedia" \
            . 2>/dev/null || true)
          if [ -n "$hits" ]; then
            msg=$'MEDIA-AUTOSTART-001: getUserMedia() may be called on page load — require explicit user action:\n'"$hits"
            if [ "${{ steps.mode.outputs.block }}" = "true" ]; then
              echo "::error::$msg"; exit 1
            else
              echo "::warning::$msg"
            fi
          fi

      - name: MEDIA-TUS-001 — no full-file upload endpoints (no FormData without TUS)
        shell: bash
        run: |
          set -euo pipefail
          hits=$(grep -Prn \
            --include='*.ts' --include='*.js' --include='*.tsx' --include='*.jsx' \
            --exclude-dir=node_modules --exclude-dir=dist \
            --exclude='*.test.*' --exclude='*.spec.*' \
            "new\s+FormData\s*\(\s*\)" \
            . 2>/dev/null || true)
          if [ -n "$hits" ]; then
            msg=$'MEDIA-TUS-001: FormData usage found — use TUS chunked protocol, not full-file POST:\n'"$hits"
            if [ "${{ steps.mode.outputs.block }}" = "true" ]; then
              echo "::error::$msg"; exit 1
            else
              echo "::warning::$msg"
            fi
          fi

      - name: MEDIA-CHUNK-001 — TUS chunk size <= 512 KB in source constants
        shell: bash
        run: |
          set -euo pipefail
          hits=$(grep -Prn \
            --include='*.ts' --include='*.js' --include='*.tsx' --include='*.jsx' \
            --exclude-dir=node_modules --exclude-dir=dist \
            'chunkSize\s*[=:]\s*[0-9]+' \
            . 2>/dev/null \
            | while IFS= read -r line; do
                val=$(printf '%s' "$line" | grep -Po 'chunkSize\s*[=:]\s*\K[0-9]+' || true)
                [ -n "$val" ] && [ "$val" -gt 524288 ] && echo "$line"
              done \
            || true)
          if [ -n "$hits" ]; then
            msg=$'MEDIA-CHUNK-001: TUS chunk size constant > 512 KB found:\n'"$hits"
            if [ "${{ steps.mode.outputs.block }}" = "true" ]; then
              echo "::error::$msg"; exit 1
            else
              echo "::warning::$msg"
            fi
          fi

      - name: MEDIA-FFMPEG-001 — no user-supplied FFmpeg arguments (server-side)
        shell: bash
        run: |
          set -euo pipefail
          hits=$(grep -Prn \
            --include='*.ts' --include='*.js' --include='*.php' \
            --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=vendor \
            --exclude='*.test.*' --exclude='*.spec.*' \
            'ffmpeg[^`"'"'"']*\$\{?(req|body|params|query|user|input)\b' \
            . 2>/dev/null || true)
          if [ -n "$hits" ]; then
            msg=$'MEDIA-FFMPEG-001: user-supplied argument interpolated into FFmpeg command:\n'"$hits"
            if [ "${{ steps.mode.outputs.block }}" = "true" ]; then
              echo "::error::$msg"; exit 1
            else
              echo "::warning::$msg"
            fi
          fi

      - name: MEDIA-WAV-001 — no WAV or uncompressed PCM upload/output
        shell: bash
        run: |
          set -euo pipefail
          hits=$(grep -Prin \
            --include='*.ts' --include='*.js' --include='*.tsx' --include='*.jsx' --include='*.php' \
            --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=vendor \
            --exclude='*.test.*' --exclude='*.spec.*' \
            "['\"]audio/wav['\"]|['\"]audio/x-wav['\"]|['\"]audio/pcm['\"]|\\.wav['\"]" \
            . 2>/dev/null || true)
          if [ -n "$hits" ]; then
            msg=$'MEDIA-WAV-001: WAV or uncompressed PCM format reference found — use Opus or AAC-LC:\n'"$hits"
            if [ "${{ steps.mode.outputs.block }}" = "true" ]; then
              echo "::error::$msg"; exit 1
            else
              echo "::warning::$msg"
            fi
          fi

      # ── Bucket-3: warn-only gaps (Directive 5 — pending ADR ratification) ──

      - name: MEDIA-CONSTRAINTS-002 (warn-only) — channelCount > 1 in getUserMedia constraints
        shell: bash
        run: |
          set -euo pipefail
          hits=$(grep -Prn \
            --include='*.ts' --include='*.js' --include='*.tsx' --include='*.jsx' \
            --exclude-dir=node_modules --exclude-dir=dist \
            --exclude='*.test.*' --exclude='*.spec.*' \
            'channelCount\s*:\s*[2-9]' \
            . 2>/dev/null || true)
          [ -n "$hits" ] && echo "::warning::MEDIA-CONSTRAINTS-002 (advisory): channelCount > 1 — mono capture required (sampleRate <= 16 kHz, 1 channel):"$'\n'"$hits" || true

      - name: MEDIA-CONSTRAINTS-003 (warn-only) — bitrate > 32000 in audio constraints
        shell: bash
        run: |
          set -euo pipefail
          hits=$(grep -Prn \
            --include='*.ts' --include='*.js' --include='*.tsx' --include='*.jsx' \
            --exclude-dir=node_modules --exclude-dir=dist \
            --exclude='*.test.*' --exclude='*.spec.*' \
            'bitrate\s*[=:]\s*([3-9][2-9]\d{3}|[4-9]\d{4}|[1-9]\d{5,})' \
            . 2>/dev/null || true)
          [ -n "$hits" ] && echo "::warning::MEDIA-CONSTRAINTS-003 (advisory): audio bitrate > 32 kbps — use <= 32000:"$'\n'"$hits" || true
