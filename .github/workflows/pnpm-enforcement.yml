# Reusable workflow: enforce ADR-017 (pnpm platform-wide) in any consuming repo.
#
# Backs rule IDs NODE-PKG-001..004 in CI-Enforcement-Matrix.md.
# Per the master catalog (docs/standards-catalog.md, Part III Layer 3), this is the
# template the rest of the per-domain reusable workflows follow: enforcement_mode-aware
# (advisory warns; required blocks), thin wrapper, six-line caller per repo.
#
# Caller example (.github/workflows/standards.yml in a consuming repo):
#
#   name: Standards
#   on: [pull_request, push]
#   jobs:
#     pnpm:
#       uses: Starisian-Technologies/sparxstar-code-conformance/.github/workflows/pnpm-enforcement.yml@v1
#       with:
#         enforcement_mode: required   # gate | advisory

name: pnpm enforcement (ADR-017)

on:
  workflow_call:
    inputs:
      enforcement_mode:
        description: 'gate (fail-closed) | advisory (warn-only) | (empty = legacy mode fallback)'
        required: false
        type: string
        default: ''
      mode:
        description: 'DEPRECATED: use enforcement_mode.'
        # REMOVAL: 2027-01-01 — all callers must migrate to enforcement_mode before this date
        required: false
        type: string
        default: draft

jobs:
  enforce:
    name: ADR-017 conformance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Warn on deprecated 'mode' input
        if: inputs.enforcement_mode == ''
        shell: bash
        run: |
          echo "::warning::DEPRECATED: 'mode' input will be removed 2027-01-01 — migrate to 'enforcement_mode: gate | advisory' (STD-TOOLCHAIN-001 §3)"

      # Sanitize inputs through env vars (CodeQL: never interpolate workflow_call inputs directly into shell).
      - name: Determine block behavior
        id: mode
        env:
          INPUT_EM: ${{ inputs.enforcement_mode }}
          INPUT_LM: ${{ inputs.mode }}
        shell: bash
        run: |
          set -euo pipefail
          em="$INPUT_EM"
          lm="$INPUT_LM"
          if [ "$em" = "gate" ]; then
            echo "block=true" >> "$GITHUB_OUTPUT"
          elif [ "$em" = "advisory" ]; then
            echo "block=false" >> "$GITHUB_OUTPUT"
          elif [ -z "$em" ]; then
            # REMOVAL: 2027-01-01 — legacy mode bridge; callers must migrate to enforcement_mode
            case "$lm" in
              draft)                    echo "block=false" >> "$GITHUB_OUTPUT" ;;
              development|production)   echo "block=true"  >> "$GITHUB_OUTPUT" ;;
              *)
                echo "::error::Unknown mode '$lm' — migrate to enforcement_mode: gate | advisory (STD-TOOLCHAIN-001 §3)"
                exit 1 ;;
            esac
          else
            echo "::error::Unknown enforcement_mode '$em' — expected gate | advisory (STD-TOOLCHAIN-001 §3)"
            exit 1
          fi

      - name: NODE-PKG-002 — no foreign lockfiles
        env:
          BLOCK_MODE: ${{ steps.mode.outputs.block }}
        shell: bash
        run: |
          set -euo pipefail
          forbidden=()
          for f in package-lock.json yarn.lock npm-shrinkwrap.json; do
            if [ -f "$f" ]; then forbidden+=("$f"); fi
          done
          if [ ${#forbidden[@]} -gt 0 ]; then
            msg="ADR-017 (NODE-PKG-002): forbidden lockfile(s) present: ${forbidden[*]}"
            if [ "$BLOCK_MODE" = "true" ]; then
              echo "::error::$msg"
              exit 1
            else
              echo "::warning::$msg"
            fi
          fi

      - name: NODE-PKG-003 — packageManager field is pinned pnpm
        if: hashFiles('package.json') != ''
        env:
          BLOCK_MODE: ${{ steps.mode.outputs.block }}
        shell: bash
        run: |
          set -euo pipefail
          pm=$(node -e "try { const p = require('./package.json'); process.stdout.write(p.packageManager || '') } catch (e) { process.stdout.write('') }")
          if [[ "$pm" != pnpm@* ]]; then
            msg="ADR-017 (NODE-PKG-003): package.json missing pinned packageManager (expected 'pnpm@<version>', got '${pm:-<unset>}')"
            if [ "$BLOCK_MODE" = "true" ]; then
              echo "::error::$msg"
              exit 1
            else
              echo "::warning::$msg"
            fi
          fi

      - name: NODE-PKG-001 — workflows/scripts do not invoke npm or yarn install
        env:
          BLOCK_MODE: ${{ steps.mode.outputs.block }}
        shell: bash
        run: |
          set -euo pipefail
          # ERE-safe boundary: command tokens must be followed by whitespace or end-of-line
          # (POSIX ERE does not implement \b — that would match a backspace byte).
          patterns='(^|[^[:alnum:]_-])(npm[[:space:]]+(install|i|ci)([[:space:]]|$)|yarn[[:space:]]+(install|add)([[:space:]]|$))'
          hits=$(grep -REn --include='*.yml' --include='*.yaml' --include='*.sh' \
              --include='Dockerfile*' --include='Makefile*' --include='package.json' --include='README*' --include='*.md' \
              --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=vendor --exclude-dir=dist --exclude-dir=build \
              -e "$patterns" . 2>/dev/null || true)
          if [ -n "$hits" ]; then
            msg=$'ADR-017 (NODE-PKG-001): non-pnpm package manager invocation found:\n'"$hits"
            if [ "$BLOCK_MODE" = "true" ]; then
              echo "::error::$msg"
              exit 1
            else
              echo "::warning::$msg"
            fi
          fi

      - name: NODE-PKG-004 — pnpm install --frozen-lockfile dry run
        if: hashFiles('package.json') != ''
        env:
          BLOCK_MODE: ${{ steps.mode.outputs.block }}
          INPUT_EM: ${{ inputs.enforcement_mode }}
          INPUT_LM: ${{ inputs.mode }}
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          em="$INPUT_EM"
          lm="$INPUT_LM"
          if [ -f pnpm-lock.yaml ]; then
            if [ "$em" = "gate" ] || { [ -z "$em" ] && { [ "$lm" = "development" ] || [ "$lm" = "production" ]; }; }; then
              pnpm install --frozen-lockfile
            else
              pnpm install
            fi
          else
            msg="ADR-017 (NODE-PKG-004): package.json present but pnpm-lock.yaml missing — --frozen-lockfile requires it"
            if [ "$BLOCK_MODE" = "true" ]; then
              echo "::error::$msg"
              exit 1
            else
              echo "::warning::$msg"
              pnpm install --no-frozen-lockfile
            fi
          fi
