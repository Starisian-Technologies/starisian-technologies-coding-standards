# ============================================================
# STD-TOOLCHAIN-001 v1.3 — standalone-react Ecosystem Enforcement
# Workflow ref: see caller for pin; never use @main in production.
# Profile: standalone-react
# ============================================================
#
# STATICALLY ENFORCED HERE:
#   - JS-LINT-001: ESLint with typescript-eslint flat config
#   - JS-TYPE-001: TypeScript strict type check (noEmit)
#   - JS-BUILD-001: production build
#   - JS-BUNDLE-001: gzipped bundle size limit
#   - JS-CONSOLE-001: no console.log in production build output
#   - JS-A11Y-001: Playwright / axe-core accessibility tests (if configured)
#
# VERIFIED VIA PRESENCE VALIDATION (warn-only pending §4 fixtures):
#   - package.json and pnpm-lock.yaml present
#   - eslint.config.mjs present (ESLint 9 flat config required)
#   - tsconfig.json present
#   - .stylelintrc.json (or variant) present
#   - typescript-eslint declared in devDependencies
#   - vitest declared (or exception for jest migration)
#   - @wordpress/scripts absent (prohibited in standalone repos)
#
# NOT MACHINE-CHECKED (requires conformance test suite — §6):
#   - tsconfig.json strict: true value (runtime node check in node-enforcement)
#   - eslint.config.mjs extends typescript-eslint correctly
#   - Vitest config present and tests pass
#
# Caller example: see caller-templates/standards-react.yml
# ============================================================

name: React enforcement (STD-TOOLCHAIN-001 v1.3)

on:
  workflow_call:
    inputs:
      repo_type:
        description: 'Repo type: standalone-react'
        required: false
        type: string
        default: standalone-react
      profile_version:
        description: 'Profile version to validate against (e.g. v1).'
        required: false
        type: string
        default: v1
      enforcement_mode:
        description: 'gate (fail-closed) | advisory (warn-only) | (empty = legacy mode fallback)'
        required: false
        type: string
        default: ''
      mode:
        description: 'DEPRECATED: use enforcement_mode.'
        # REMOVAL: 2027-01-01 — all callers must migrate to enforcement_mode before this date
        required: false
        type: string
        default: draft
      node-version:
        description: 'Node.js version to use.'
        required: false
        type: string
        default: '22'
      bundle-size-limit-kb:
        description: 'Max gzipped JS bundle size in KB (JS-BUNDLE-001, default 150).'
        required: false
        type: number
        default: 150

jobs:
  enforce:
    name: React/JS standards conformance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse standards exceptions (.standards/standards-exceptions.yml)
        id: exceptions
        # GitHub's YAML parser breaks on Python heredoc syntax when code is at column 0.
        # Script is stored in an env var; textwrap.dedent strips the YAML-induced indentation.
        env:
          PARSE_SCRIPT: |
            import sys, os, textwrap
            from datetime import date
            try:
                import yaml
            except ImportError:
                print("::error::PyYAML not available after install attempt — cannot parse exceptions file")
                sys.exit(1)
            today = date.today().isoformat()
            active = []
            expired = []
            malformed = []
            try:
                with open(".standards/standards-exceptions.yml") as f:
                    data = yaml.safe_load(f) or {}
            except Exception as e:
                print(f"::error::standards-exceptions.yml malformed — {e}")
                sys.exit(1)
            exceptions = data.get("exceptions", [])
            if not isinstance(exceptions, list):
                print("::error::standards-exceptions.yml malformed — 'exceptions' must be a list")
                sys.exit(1)
            for exc in exceptions:
                if not isinstance(exc, dict):
                    malformed.append("<no-id>")
                    continue
                required_fields = ["id", "rule", "reason", "owner", "expires", "approval"]
                missing = [f for f in required_fields if f not in exc]
                if missing:
                    malformed.append(exc.get("id", "<no-id>"))
                    continue
                expires = exc["expires"]
                if expires is None:
                    malformed.append(exc.get("id", "<no-id>"))
                    continue
                if not isinstance(expires, str):
                    if hasattr(expires, "isoformat"):
                        expires = expires.isoformat()
                    else:
                        malformed.append(exc.get("id", "<no-id>"))
                        continue
                if expires < today:
                    expired.append(exc["id"])
                else:
                    active.append(exc["id"])
                    print(f"::notice::Active exception: {exc['id']} — {exc['rule']} — expires {expires} — {exc['reason']}")
            if expired:
                print(f"::error::Expired exceptions (fail-closed per STD-TOOLCHAIN-001 §8): {', '.join(expired)}")
                sys.exit(1)
            if malformed:
                print(f"::error::Malformed exception entries: {', '.join(malformed)}")
                sys.exit(1)
            with open(os.environ["GITHUB_OUTPUT"], "a") as out:
                out.write(f"active_exceptions={','.join(active)}\n")
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f ".standards/standards-exceptions.yml" ]; then
            echo "active_exceptions=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          pip3 install pyyaml --quiet
          python3 -c "import textwrap, os; exec(textwrap.dedent(os.environ['PARSE_SCRIPT']))"

      - name: Warn on deprecated 'mode' input
        if: inputs.enforcement_mode == ''
        shell: bash
        run: |
          echo "::warning::DEPRECATED: 'mode' input will be removed 2027-01-01 — migrate to 'enforcement_mode: gate | advisory' (STD-TOOLCHAIN-001 §3)"

      - name: Presence validation — standalone-react profile
        # WARN-ONLY — flips to required after self-test fixtures authored (STD-TOOLCHAIN-001 §4)
        # Exception: package.json is fail-closed for typed standalone repos regardless of §4 status.
        env:
          PRESENCE_CHECK_REACT: |
            import json
            with open('package.json') as f:
                p = json.load(f)
            rd = {**p.get('devDependencies',{}), **p.get('dependencies',{})}

            if 'typescript-eslint' not in rd:
                print('::warning::PRESENCE: package.json missing typescript-eslint (required for standalone-react)')
            if '@wordpress/scripts' in rd:
                print('::warning::PRESENCE: @wordpress/scripts is PROHIBITED in standalone-react repos')
            if 'vitest' not in rd:
                print('::warning::PRESENCE: package.json missing vitest — declare §8 exception if using jest')
        shell: bash
        run: |
          set -euo pipefail
          fail() { echo "::warning::PRESENCE: $1"; }
          [ -f "package.json" ] || { echo "::error::PRESENCE: package.json missing — fail-closed"; exit 1; }
          [ -f "pnpm-lock.yaml" ] || fail "pnpm-lock.yaml missing — lockfile must be committed"
          [ -f "eslint.config.mjs" ] || fail "eslint.config.mjs missing — ESLint 9 flat config required"
          [ -f "tsconfig.json" ]  || fail "tsconfig.json missing"

          if [ ! -f ".stylelintrc.json" ] && [ ! -f "stylelint.config.js" ] && [ ! -f ".stylelintrc.js" ]; then
            fail ".stylelintrc.json (or stylelint.config.js) missing"
          fi

          if [ -f "package.json" ]; then
            python3 -c "import textwrap, os; exec(textwrap.dedent(os.environ['PRESENCE_CHECK_REACT']))" 2>&1 || echo "::warning::PRESENCE: package.json parse error"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs['node-version'] }}

      - name: Enable corepack (pnpm)
        shell: bash
        run: corepack enable

      - name: Install dependencies
        if: hashFiles('package.json') != ''
        shell: bash
        run: |
          em="${{ inputs.enforcement_mode }}"
          lm="${{ inputs.mode }}"
          if [ "$em" = "gate" ] || { [ -z "$em" ] && { [ "$lm" = "development" ] || [ "$lm" = "production" ]; }; }; then
            pnpm install --frozen-lockfile
          else
            pnpm install
          fi

      - name: Determine block behavior
        id: mode
        shell: bash
        run: |
          # enforcement_mode takes precedence; fall back to legacy mode input when empty
          em="${{ inputs.enforcement_mode }}"
          lm="${{ inputs.mode }}"
          if [ "$em" = "gate" ]; then
            echo "block=true" >> "$GITHUB_OUTPUT"
          elif [ "$em" = "advisory" ]; then
            echo "block=false" >> "$GITHUB_OUTPUT"
          elif [ -z "$em" ]; then
            # REMOVAL: 2027-01-01 — legacy mode bridge; callers must migrate to enforcement_mode
            case "$lm" in
              draft)                    echo "block=false" >> "$GITHUB_OUTPUT" ;;
              development|production)   echo "block=true"  >> "$GITHUB_OUTPUT" ;;
              *)
                echo "::error::Unknown mode '$lm' — migrate to enforcement_mode: gate | advisory (STD-TOOLCHAIN-001 §3)"
                exit 1 ;;
            esac
          else
            echo "::error::Unknown enforcement_mode '$em' — expected gate | advisory (STD-TOOLCHAIN-001 §3)"
            exit 1
          fi

      - name: JS-LINT-001 — ESLint
        shell: bash
        run: |
          set -euo pipefail
          if ! pnpm exec eslint . --max-warnings=0 2>&1; then
            if [ "${{ steps.mode.outputs.block }}" = "true" ]; then
              echo "::error::JS-LINT-001: ESLint violations found"
              exit 1
            else
              pnpm exec eslint . || true
              echo "::warning::JS-LINT-001: ESLint violations found (non-blocking)"
            fi
          fi

      - name: JS-TYPE-001 — TypeScript strict check
        if: hashFiles('tsconfig.json') != ''
        shell: bash
        run: |
          set -euo pipefail
          if ! pnpm exec tsc --noEmit 2>&1; then
            if [ "${{ steps.mode.outputs.block }}" = "true" ]; then
              echo "::error::JS-TYPE-001: TypeScript type errors found"
              exit 1
            else
              pnpm exec tsc --noEmit || true
              echo "::warning::JS-TYPE-001: TypeScript errors found (non-blocking)"
            fi
          fi

      - name: JS-TEST-001 — unit tests (Vitest / Jest)
        shell: bash
        run: |
          set -euo pipefail
          if [ "$(find . -name 'vitest.config.*' -not -path '*/node_modules/*' | head -1)" != "" ]; then
            runner="vitest run"
          elif [ "$(find . -name 'jest.config.*' -not -path '*/node_modules/*' | head -1)" != "" ]; then
            runner="jest --ci --passWithNoTests"
          else
            echo "::warning::JS-TEST-001: no vitest.config.* or jest.config.* found — skipping unit tests"
            exit 0
          fi
          if ! pnpm exec $runner 2>&1; then
            if [ "${{ steps.mode.outputs.block }}" = "true" ]; then
              echo "::error::JS-TEST-001: unit test suite failed"; exit 1
            else
              pnpm exec $runner || true
              echo "::warning::JS-TEST-001: unit test failures (non-blocking)"
            fi
          fi

      - name: JS-BUILD-001 — production build
        shell: bash
        run: |
          set -euo pipefail
          if ! pnpm run --if-present build 2>&1; then
            if [ "${{ steps.mode.outputs.block }}" = "true" ]; then
              echo "::error::JS-BUILD-001: Production build failed"
              exit 1
            else
              echo "::warning::JS-BUILD-001: Production build failed (non-blocking)"
            fi
          fi

      - name: JS-BUNDLE-001 — total bundle size <= ${{ inputs['bundle-size-limit-kb'] }} KB gzipped
        shell: bash
        run: |
          set -euo pipefail
          limit_kb="${{ inputs['bundle-size-limit-kb'] }}"
          limit_bytes=$(( limit_kb * 1024 ))

          js_dir=""
          for candidate in dist build out; do
            if [ -d "$candidate" ]; then js_dir="$candidate"; break; fi
          done

          if [ -z "$js_dir" ]; then
            echo "::notice::JS-BUNDLE-001: no dist/build/out directory found — skipping"
            exit 0
          fi

          total_bytes=0
          while IFS= read -r -d '' file; do
            size=$(gzip -c "$file" | wc -c)
            total_bytes=$(( total_bytes + size ))
          done < <(find "$js_dir" \( -name '*.js' -o -name '*.mjs' \) -not -name '*.map' -print0)

          total_kb=$(( total_bytes / 1024 ))
          echo "::notice::JS-BUNDLE-001: total JS bundle ${total_kb} KB gzipped (limit ${limit_kb} KB)"

          if [ "$total_bytes" -gt "$limit_bytes" ]; then
            msg="JS-BUNDLE-001: total JS bundle ${total_kb} KB gzipped exceeds limit of ${limit_kb} KB"
            if [ "${{ steps.mode.outputs.block }}" = "true" ]; then
              echo "::error::$msg"; exit 1
            else
              echo "::warning::$msg"
            fi
          fi

      - name: JS-CONSOLE-001 — no console.log in production build output
        if: inputs.mode == 'production' || inputs.enforcement_mode == 'required'
        shell: bash
        run: |
          set -euo pipefail
          js_dir=""
          for candidate in dist build out; do
            if [ -d "$candidate" ]; then js_dir="$candidate"; break; fi
          done

          if [ -z "$js_dir" ]; then
            echo "::notice::JS-CONSOLE-001: no build output directory found — skipping"
            exit 0
          fi

          hits=$(grep -Prn 'console\.log' "$js_dir" --include='*.js' \
            --exclude='*.map' 2>/dev/null || true)
          if [ -n "$hits" ]; then
            msg=$'JS-CONSOLE-001: console.log found in production build output:\n'"$hits"
            if [ "${{ steps.mode.outputs.block }}" = "true" ]; then
              echo "::error::$msg"; exit 1
            else
              echo "::warning::$msg"
            fi
          fi

      - name: JS-A11Y-001 — accessibility scan (axe-core via Playwright)
        if: hashFiles('playwright.config.*') != ''
        shell: bash
        run: |
          set -euo pipefail
          if ! pnpm exec playwright test --reporter=github 2>&1; then
            if [ "${{ steps.mode.outputs.block }}" = "true" ]; then
              echo "::error::JS-A11Y-001: Playwright / axe-core accessibility tests failed"
              exit 1
            else
              pnpm exec playwright test || true
              echo "::warning::JS-A11Y-001: Playwright accessibility failures found (non-blocking)"
            fi
          fi
