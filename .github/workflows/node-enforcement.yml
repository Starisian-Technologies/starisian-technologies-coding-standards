# ============================================================
# STD-TOOLCHAIN-001 v1.3 — standalone-node Ecosystem Enforcement
# Workflow ref: see caller for pin; never use @main in production.
# Profile: standalone-node
# ============================================================
#
# STATICALLY ENFORCED HERE:
#   - NODE-TYPE-001: TypeScript strict check (noEmit) + strict: true in tsconfig
#   - NODE-LINT-001: ESLint with typescript-eslint flat config
#   - NODE-EVAL-001: no eval() or new Function() in source
#   - NODE-SQL-001: no raw SQL string interpolation
#   - NODE-SQL-002: no SELECT *
#   - NODE-ENV-001: no process.env outside config module
#   - NODE-LOG-001: no console.* in production source
#   - NODE-ESM-001: package.json "type": "module"
#   - NODE-TEST-001: Vitest test suite (Jest fallback, if configured)
#   - NODE-AUDIT-001: pnpm vulnerability audit
#
# VERIFIED VIA PRESENCE VALIDATION (warn-only pending §4 fixtures):
#   - package.json and pnpm-lock.yaml present
#   - eslint.config.mjs present
#   - tsconfig.json present
#   - typescript-eslint declared
#   - eslint-plugin-n declared (NOT eslint-plugin-node)
#   - eslint-plugin-node absent (unmaintained — prohibited)
#   - @wordpress/scripts absent (prohibited)
#
# NOT MACHINE-CHECKED (requires conformance test suite — §6):
#   - vitest.config.ts present (vitest preferred; jest needs §8 exception)
#   - tsconfig.json strict: true enforced at build time
#
# Caller example: see caller-templates/standards-node.yml
# ============================================================

name: Node.js enforcement (STD-TOOLCHAIN-001 v1.3)

on:
  workflow_call:
    inputs:
      repo_type:
        description: 'Repo type: standalone-node'
        required: false
        type: string
        default: standalone-node
      profile_version:
        description: 'Profile version to validate against (e.g. v1).'
        required: false
        type: string
        default: v1
      enforcement_mode:
        description: 'gate (fail-closed) | advisory (warn-only) | (empty = legacy mode fallback)'
        required: false
        type: string
        default: ''
      mode:
        description: 'DEPRECATED: use enforcement_mode.'
        # REMOVAL: 2027-01-01 — all callers must migrate to enforcement_mode before this date
        required: false
        type: string
        default: draft
      node-version:
        description: 'Node.js LTS version to use.'
        required: false
        type: string
        default: '22'

jobs:
  enforce:
    name: Node.js/TS standards conformance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse standards exceptions (.standards/standards-exceptions.yml)
        id: exceptions
        # GitHub's YAML parser breaks on Python heredoc syntax when code is at column 0.
        # Script is stored in an env var; textwrap.dedent strips the YAML-induced indentation.
        env:
          PARSE_SCRIPT: |
            import sys, os, textwrap
            from datetime import date
            try:
                import yaml
            except ImportError:
                print("::error::PyYAML not available after install attempt — cannot parse exceptions file")
                sys.exit(1)
            today = date.today().isoformat()
            active = []
            expired = []
            malformed = []
            try:
                with open(".standards/standards-exceptions.yml") as f:
                    data = yaml.safe_load(f) or {}
            except Exception as e:
                print(f"::error::standards-exceptions.yml malformed — {e}")
                sys.exit(1)
            exceptions = data.get("exceptions", [])
            if not isinstance(exceptions, list):
                print("::error::standards-exceptions.yml malformed — 'exceptions' must be a list")
                sys.exit(1)
            for exc in exceptions:
                if not isinstance(exc, dict):
                    malformed.append("<no-id>")
                    continue
                required_fields = ["id", "rule", "reason", "owner", "expires", "approval"]
                missing = [f for f in required_fields if f not in exc]
                if missing:
                    malformed.append(exc.get("id", "<no-id>"))
                    continue
                expires = exc["expires"]
                if expires is None:
                    malformed.append(exc.get("id", "<no-id>"))
                    continue
                if not isinstance(expires, str):
                    if hasattr(expires, "isoformat"):
                        expires = expires.isoformat()
                    else:
                        malformed.append(exc.get("id", "<no-id>"))
                        continue
                if expires < today:
                    expired.append(exc["id"])
                else:
                    active.append(exc["id"])
                    print(f"::notice::Active exception: {exc['id']} — {exc['rule']} — expires {expires} — {exc['reason']}")
            if expired:
                print(f"::error::Expired exceptions (fail-closed per STD-TOOLCHAIN-001 §8): {', '.join(expired)}")
                sys.exit(1)
            if malformed:
                print(f"::error::Malformed exception entries: {', '.join(malformed)}")
                sys.exit(1)
            with open(os.environ["GITHUB_OUTPUT"], "a") as out:
                out.write(f"active_exceptions={','.join(active)}\n")
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f ".standards/standards-exceptions.yml" ]; then
            echo "active_exceptions=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          pip3 install pyyaml --quiet
          python3 -c "import textwrap, os; exec(textwrap.dedent(os.environ['PARSE_SCRIPT']))"

      - name: Warn on deprecated 'mode' input
        if: inputs.enforcement_mode == ''
        shell: bash
        run: |
          echo "::warning::DEPRECATED: 'mode' input will be removed 2027-01-01 — migrate to 'enforcement_mode: gate | advisory' (STD-TOOLCHAIN-001 §3)"

      - name: Presence validation — standalone-node profile
        # WARN-ONLY — flips to required after self-test fixtures authored (STD-TOOLCHAIN-001 §4)
        # Exception: package.json is fail-closed for typed standalone repos regardless of §4 status.
        env:
          PRESENCE_CHECK_NODE: |
            import json
            with open('package.json') as f:
                p = json.load(f)
            rd = {**p.get('devDependencies',{}), **p.get('dependencies',{})}

            if 'typescript-eslint' not in rd:
                print('::warning::PRESENCE: package.json missing typescript-eslint')
            if 'eslint-plugin-n' not in rd:
                print('::warning::PRESENCE: package.json missing eslint-plugin-n (use eslint-plugin-n, not eslint-plugin-node)')
            if 'eslint-plugin-node' in rd:
                print('::warning::PRESENCE: eslint-plugin-node is PROHIBITED (unmaintained for ESLint 9) — use eslint-plugin-n')
            if '@wordpress/scripts' in rd:
                print('::warning::PRESENCE: @wordpress/scripts is PROHIBITED in standalone-node repos')
        shell: bash
        run: |
          set -euo pipefail
          fail() { echo "::warning::PRESENCE: $1"; }

          # package.json is non-negotiable for standalone-node — hard fail, not warn
          if [ ! -f "package.json" ]; then
            echo "::error::PRESENCE: package.json missing — standalone-node profile requires it (fail-closed)"
            exit 1
          fi
          [ -f "pnpm-lock.yaml" ]   || fail "pnpm-lock.yaml missing — lockfile must be committed"
          [ -f "eslint.config.mjs" ] || fail "eslint.config.mjs missing — ESLint 9 flat config required"
          [ -f "tsconfig.json" ]    || fail "tsconfig.json missing"

          if [ -f "package.json" ]; then
            python3 -c "import textwrap, os; exec(textwrap.dedent(os.environ['PRESENCE_CHECK_NODE']))" 2>&1 || echo "::warning::PRESENCE: package.json parse error"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs['node-version'] }}

      - name: Enable corepack (pnpm)
        shell: bash
        run: corepack enable

      - name: Install dependencies
        if: hashFiles('package.json') != ''
        shell: bash
        run: |
          em="${{ inputs.enforcement_mode }}"
          lm="${{ inputs.mode }}"
          if [ "$em" = "gate" ] || { [ -z "$em" ] && { [ "$lm" = "development" ] || [ "$lm" = "production" ]; }; }; then
            pnpm install --frozen-lockfile
          else
            pnpm install
          fi

      - name: Determine block behavior
        id: mode
        shell: bash
        run: |
          # enforcement_mode takes precedence; fall back to legacy mode input when empty
          em="${{ inputs.enforcement_mode }}"
          lm="${{ inputs.mode }}"
          if [ "$em" = "gate" ]; then
            echo "block=true" >> "$GITHUB_OUTPUT"
          elif [ "$em" = "advisory" ]; then
            echo "block=false" >> "$GITHUB_OUTPUT"
          elif [ -z "$em" ]; then
            # REMOVAL: 2027-01-01 — legacy mode bridge; callers must migrate to enforcement_mode
            case "$lm" in
              draft)                    echo "block=false" >> "$GITHUB_OUTPUT" ;;
              development|production)   echo "block=true"  >> "$GITHUB_OUTPUT" ;;
              *)
                echo "::error::Unknown mode '$lm' — migrate to enforcement_mode: gate | advisory (STD-TOOLCHAIN-001 §3)"
                exit 1 ;;
            esac
          else
            echo "::error::Unknown enforcement_mode '$em' — expected gate | advisory (STD-TOOLCHAIN-001 §3)"
            exit 1
          fi

      - name: NODE-TYPE-001 — TypeScript strict check (noEmit)
        if: hashFiles('tsconfig.json') != ''
        shell: bash
        run: |
          set -euo pipefail
          if ! pnpm exec tsc --noEmit 2>&1; then
            if [ "${{ steps.mode.outputs.block }}" = "true" ]; then
              echo "::error::NODE-TYPE-001: TypeScript violations found"
              exit 1
            else
              pnpm exec tsc --noEmit || true
              echo "::warning::NODE-TYPE-001: TypeScript errors (non-blocking)"
            fi
          fi

      - name: NODE-TYPE-001 — tsconfig.json strict mode enabled
        if: hashFiles('tsconfig.json') != ''
        shell: bash
        run: |
          set -euo pipefail
          # tsc --showConfig resolves extends and handles JSONC (comments/trailing commas)
          strict=$(pnpm exec tsc --showConfig 2>/dev/null \
            | node -e "
                let d='';
                process.stdin.on('data',c=>d+=c);
                process.stdin.on('end',()=>{
                  try {
                    const cfg=JSON.parse(d);
                    process.stdout.write(String(cfg?.compilerOptions?.strict??false));
                  } catch { process.stdout.write('parse-error'); }
                });
              " || echo 'parse-error')
          if [ "$strict" != "true" ]; then
            msg='NODE-TYPE-001: tsconfig.json missing "strict": true — strict mode is mandatory'
            if [ "${{ steps.mode.outputs.block }}" = "true" ]; then
              echo "::error::$msg"; exit 1
            else
              echo "::warning::$msg"
            fi
          fi

      - name: NODE-LINT-001 — ESLint with @typescript-eslint
        shell: bash
        run: |
          set -euo pipefail
          if ! pnpm exec eslint . --max-warnings=0 2>&1; then
            if [ "${{ steps.mode.outputs.block }}" = "true" ]; then
              echo "::error::NODE-LINT-001: ESLint violations found"
              exit 1
            else
              pnpm exec eslint . || true
              echo "::warning::NODE-LINT-001: ESLint violations (non-blocking)"
            fi
          fi

      - name: NODE-EVAL-001 — no eval() or new Function() in source
        shell: bash
        run: |
          set -euo pipefail
          hits=$(grep -Prn \
            --include='*.ts' --include='*.js' --include='*.mjs' \
            --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=build \
            '\beval\s*\(|new\s+Function\s*\(' \
            . 2>/dev/null || true)
          if [ -n "$hits" ]; then
            msg=$'NODE-EVAL-001: eval() or new Function() found:\n'"$hits"
            if [ "${{ steps.mode.outputs.block }}" = "true" ]; then
              echo "::error::$msg"; exit 1
            else
              echo "::warning::$msg"
            fi
          fi

      - name: NODE-SQL-001 — no raw SQL interpolation
        shell: bash
        run: |
          set -euo pipefail
          hits=$(grep -Prn \
            --include='*.ts' --include='*.js' \
            --exclude-dir=node_modules --exclude-dir=dist \
            '\.(query|raw)\s*\(`[^`]*\$\{' \
            . 2>/dev/null || true)
          if [ -n "$hits" ]; then
            msg=$'NODE-SQL-001: raw SQL string interpolation found:\n'"$hits"
            if [ "${{ steps.mode.outputs.block }}" = "true" ]; then
              echo "::error::$msg"; exit 1
            else
              echo "::warning::$msg"
            fi
          fi

      - name: NODE-SQL-002 — no SELECT *
        shell: bash
        run: |
          set -euo pipefail
          hits=$(grep -Prin \
            --include='*.ts' --include='*.js' \
            --exclude-dir=node_modules --exclude-dir=dist \
            'SELECT\s+\*\s+FROM' \
            . 2>/dev/null || true)
          if [ -n "$hits" ]; then
            msg=$'NODE-SQL-002: SELECT * found — enumerate columns explicitly:\n'"$hits"
            if [ "${{ steps.mode.outputs.block }}" = "true" ]; then
              echo "::error::$msg"; exit 1
            else
              echo "::warning::$msg"
            fi
          fi

      - name: NODE-ENV-001 — no hardcoded secrets or process.env in business logic
        shell: bash
        run: |
          set -euo pipefail
          hits=$(grep -Prln \
            --include='*.ts' --include='*.js' \
            --exclude-dir=node_modules --exclude-dir=dist \
            'process\.env\.' \
            . 2>/dev/null \
            | grep -vE '(config|env|settings|constants)\.(ts|js|mjs)$' \
            | grep -vE '__tests__|\.test\.|\.spec\.' \
            || true)
          if [ -n "$hits" ]; then
            msg=$'NODE-ENV-001: process.env accessed outside config module in:\n'"$hits"
            if [ "${{ steps.mode.outputs.block }}" = "true" ]; then
              echo "::error::$msg"; exit 1
            else
              echo "::warning::$msg"
            fi
          fi

      - name: NODE-LOG-001 — no console.log in production source
        if: inputs.mode == 'production' || inputs.enforcement_mode == 'required'
        shell: bash
        run: |
          set -euo pipefail
          hits=$(grep -Prn \
            --include='*.ts' --include='*.js' \
            --exclude-dir=node_modules --exclude-dir=dist \
            --exclude='*.test.*' --exclude='*.spec.*' \
            'console\.(log|warn|error|debug|info)\s*\(' \
            . 2>/dev/null || true)
          if [ -n "$hits" ]; then
            msg=$'NODE-LOG-001: console.* found in production source:\n'"$hits"
            if [ "${{ steps.mode.outputs.block }}" = "true" ]; then
              echo "::error::$msg"; exit 1
            else
              echo "::warning::$msg"
            fi
          fi

      - name: 'NODE-ESM-001 — package.json declares "type": "module"'
        if: hashFiles('package.json') != ''
        shell: bash
        run: |
          set -euo pipefail
          pkg_type=$(node -e "
            try {
              const p = require('./package.json');
              process.stdout.write(p.type || '');
            } catch { process.stdout.write(''); }
          ")
          if [ "$pkg_type" != "module" ]; then
            msg='NODE-ESM-001: package.json missing "type": "module" — ESM required'
            if [ "${{ steps.mode.outputs.block }}" = "true" ]; then
              echo "::error::$msg"; exit 1
            else
              echo "::warning::$msg"
            fi
          fi

      - name: NODE-TEST-001 — unit tests (Vitest / Jest)
        shell: bash
        run: |
          set -euo pipefail
          if [ "$(find . -name 'vitest.config.*' -not -path '*/node_modules/*' | head -1)" != "" ]; then
            runner="vitest run"
          elif [ "$(find . -name 'jest.config.*' -not -path '*/node_modules/*' | head -1)" != "" ]; then
            runner="jest --ci --passWithNoTests"
          else
            echo "::warning::NODE-TEST-001: no vitest.config.* or jest.config.* found — skipping unit tests"
            exit 0
          fi
          if ! pnpm exec $runner 2>&1; then
            if [ "${{ steps.mode.outputs.block }}" = "true" ]; then
              echo "::error::NODE-TEST-001: unit test suite failed"; exit 1
            else
              pnpm exec $runner || true
              echo "::warning::NODE-TEST-001: unit test failures (non-blocking)"
            fi
          fi
      - name: NODE-AUDIT-001 — pnpm vulnerability audit
        shell: bash
        run: |
          set -euo pipefail
          if ! pnpm audit --audit-level=high 2>&1; then
            msg='NODE-AUDIT-001: high or critical CVEs found in dependencies'
            if [ "${{ steps.mode.outputs.block }}" = "true" ]; then
              echo "::error::$msg"; exit 1
            else
              pnpm audit --audit-level=high || true
              echo "::warning::$msg"
            fi
          fi
