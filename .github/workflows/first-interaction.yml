# First Interaction Welcome — Starisian Technologies Coding Standards
#
# Fires on the first issue or pull request opened by any contributor.
# This workflow governs THIS repo (the org-wide coding standards repo).
# For product repo template, see workflow-templates/first-interaction.yml.
#
# Rule ref: GIT-HYGIENE-001 (docs/standards-catalog.md — domain 14)

name: First Interaction Welcome

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  welcome:
    name: Welcome first-time contributor
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          issue-message: |
            Thank you for opening your first issue in the Starisian Technologies Coding Standards repository.

            This repository is the org-wide source of truth for how we write code — covering PHP, WordPress,
            JavaScript/TypeScript, React, CSS, SQL, Node, and more. Changes here propagate as policy
            to every product repository in the organisation.

            A few things to know before we respond:

            - **Rule changes are platform decisions.** If you are proposing a new rule or relaxing an
              existing one, describe the engineering problem you are solving, not just the change you want.
              Rules without enforcement paths do not belong here.
            - **If a rule is product-specific**, it belongs in that product's own repo, not here.
              This repo holds only org-generic rules that apply to every codebase.
            - **ADR citations are required** for any change that touches architecture or security
              boundaries. If you do not have an ADR number yet, say so — we can help route it.
            - **If you are unsure whether something belongs here**, just ask. We would rather redirect
              you early than have you draft a full proposal for the wrong repo.

            We will get back to you as soon as we can.

          pr-message: |
            Thank you for your first pull request to the Starisian Technologies Coding Standards repository.

            Before we begin review, a few things about how this repo works:

            - **Standards are enforceable or they are not standards.** Every rule added or changed
              here must have a clear enforcement path (lint rule, PHPStan rule, CI workflow, or
              documented review gate). If yours does not, the PR description should explain why and
              what the path to enforcement looks like.
            - **Keep changes small and focused.** One standard or one domain per PR. Mixed-scope
              changes are held until the scope is resolved.
            - **ADR citations are required** for rules touching authority resolution, security,
              multisite behaviour, or data integrity. Use `ADR-NNN` or `INV-NNN` format.
              If an ADR does not exist yet, the PR should be draft until it does.
            - **No product names, repo names, or trademarks** in standards text. If a rule only
              makes sense with a product name attached, it belongs in that product's repo.
            - **All contributions are subject to our licensing terms.** By opening this PR, you
              confirm you have the right to contribute this code and that it contains no secrets,
              credentials, or third-party confidential material.

            Thank you for contributing to our standards. We will review shortly.
