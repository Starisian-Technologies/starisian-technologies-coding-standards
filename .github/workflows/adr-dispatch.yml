# ADR Registry Change Dispatcher — Starisian Technologies Coding Standards
#
# Lives in: THIS repo (the standards repo — single source of truth).
# What it does: fires a repository_dispatch event to every registered consuming
# repo whenever ADR-relevant files change on the default branch.
#
# Consuming repos receive the event via their own thin adr-conformance-receiver.yml
# wrapper (see workflow-templates/adr-conformance-receiver.yml) which calls the
# reusable adr-conformance.yml workflow defined in this repo.
#
# Required secrets (set at org level or repo level):
#   STANDARDS_DISPATCH_TOKEN — a PAT or GitHub App installation token with
#     `repo` scope on every consuming repo, or `actions:write` + `contents:read`
#     via a GitHub App. GITHUB_TOKEN cannot dispatch cross-repo.
#   ADR_CONSUMER_REPOS — newline- or comma-separated list of `owner/repo` slugs
#     to notify on registry change. Example:
#       Starisian-Technologies/sparxstar-ouroboros-integrity
#       Starisian-Technologies/sparxstar-helios-trust
#
# See QUESTIONS.md WF-1 and WF-2 for open questions on token and registry strategy.

name: ADR Registry Change Dispatcher

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'CI-Enforcement-Matrix.md'
      - 'ENGINEERING-STANDARDS.md'
      - 'AGENTS.md'
      - '.github/copilot-instructions.md'

jobs:
  dispatch:
    name: Dispatch adr-registry-changed to consumers
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Identify changed files
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          changed=$(git diff --name-only HEAD~1 HEAD | tr '\n' ' ')
          echo "files=${changed}" >> "$GITHUB_OUTPUT"

          # Classify change type
          if echo "$changed" | grep -qE '(CI-Enforcement-Matrix|enforcement-matrix)'; then
            echo "type=enforcement-matrix" >> "$GITHUB_OUTPUT"
          elif echo "$changed" | grep -qE 'docs/(php|javascript|css|node|media|wordpress)'; then
            echo "type=domain-standard" >> "$GITHUB_OUTPUT"
          elif echo "$changed" | grep -qE 'docs/standards-handbook'; then
            echo "type=handbook" >> "$GITHUB_OUTPUT"
          else
            echo "type=other" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve consumer repo list
        id: consumers
        shell: bash
        run: |
          set -euo pipefail
          # ADR_CONSUMER_REPOS is a newline- or comma-separated list of owner/repo slugs.
          # If the secret is not set, this step produces an empty list and the dispatch
          # loop is skipped without error. Set the secret to enable dispatch.
          raw="${ADR_CONSUMER_REPOS:-}"
          if [ -z "$raw" ]; then
            echo "::notice::ADR_CONSUMER_REPOS is not set — no repos to notify. See QUESTIONS.md WF-1."
            echo "list=" >> "$GITHUB_OUTPUT"
          else
            # Normalise: replace commas and extra whitespace with newlines; filter blank lines
            normalised=$(echo "$raw" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$')
            # Encode as JSON array for the matrix
            json=$(echo "$normalised" | jq -R . | jq -sc .)
            echo "list=${json}" >> "$GITHUB_OUTPUT"
          fi
        env:
          ADR_CONSUMER_REPOS: ${{ secrets.ADR_CONSUMER_REPOS }}

      - name: Dispatch to each consumer repo
        if: steps.consumers.outputs.list != '' && steps.consumers.outputs.list != '[]'
        env:
          DISPATCH_TOKEN: ${{ secrets.STANDARDS_DISPATCH_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          repos='${{ steps.consumers.outputs.list }}'
          change_type='${{ steps.changed.outputs.type }}'
          changed_files='${{ steps.changed.outputs.files }}'

          echo "$repos" | jq -r '.[]' | while IFS= read -r repo; do
            echo "Dispatching to ${repo}..."
            payload=$(jq -n \
              --arg et  "adr-registry-changed" \
              --arg ct  "$change_type" \
              --arg cf  "$changed_files" \
              --arg sr  "$GITHUB_REPOSITORY" \
              --arg sha "$GITHUB_SHA" \
              --arg ref "$GITHUB_REF_NAME" \
              '{event_type: $et, client_payload: {change_type: $ct, changed_files: $cf, source_repo: $sr, source_sha: $sha, source_ref: $ref}}')
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $DISPATCH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${repo}/dispatches" \
              -d "$payload")
            if [ "$status" = "204" ]; then
              echo "  ✓ ${repo} — dispatched (HTTP 204)"
            else
              echo "::warning::Dispatch to ${repo} returned HTTP ${status} — check token permissions (QUESTIONS.md WF-2)"
            fi
          done
