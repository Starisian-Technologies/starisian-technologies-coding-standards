# First Interaction Welcome — TEMPLATE for consuming repos
#
# Copy this file to .github/workflows/first-interaction.yml in each repo.
# Customise the issue-message and pr-message for that repo's context.
#
# LIMITATION: GitHub's first-interaction action fires on repo-local events
# (issues and pull_request_target). It cannot be called from a central repo
# via workflow_call. Each repo must have its own copy of this file.
# This template is the canonical source — update it here first.
#
# How to use:
# 1. Copy this file to .github/workflows/first-interaction.yml in the target repo.
# 2. Replace all TODO: markers with content appropriate for that repo.
# 3. The GITHUB_TOKEN permissions (issues: write, pull-requests: write) are
#    required and sufficient — no additional secrets needed.

name: First Interaction Welcome

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  welcome:
    name: Welcome first-time contributor
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          issue-message: |
            # TODO: customise this message for the target repo.
            #
            # Suggested content for a product repo:
            #   - What the repo does and why it matters.
            #   - How issues are triaged (public bug vs. internal triage, platform decisions).
            #   - Where to go if the issue belongs in a different repo.
            #   - Expected response time.
            #
            # Remove these comment lines before committing.

            Welcome, and thank you for opening your first issue here.

            [TODO: one or two sentences describing what this repository is for.]

            A few things to know:

            - [TODO: note about how issues are triaged or what belongs here.]
            - [TODO: note about platform decisions or cross-repo routing.]
            - If you are unsure whether something belongs here, just ask.

            We will get back to you as soon as we can.

          pr-message: |
            # TODO: customise this message for the target repo.
            #
            # Suggested content for a product repo:
            #   - Whether files are auto-synced from another source.
            #   - PR scope and size expectations.
            #   - ADR citation requirements if applicable.
            #   - Licensing confirmation.
            #
            # Remove these comment lines before committing.

            Welcome, and thank you for your first pull request.

            Before we review, a few things about how this repo works:

            - [TODO: note about synced files, if applicable.]
            - [TODO: note about change scope (one concern per PR, etc.).]
            - [TODO: ADR/INV citation requirement if applicable.]
            - All contributions are subject to our licensing terms. By opening this PR,
              you confirm you have the right to contribute this code.

            Thank you for contributing. We will review shortly.
